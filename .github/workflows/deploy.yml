name: Deploy to GitHub Pages

# SETUP REQUIRED (einmalig): Settings → Pages → Source → "GitHub Actions"

on:
  push:
    branches: ["main", "claude/github-pages-setup-kNb4W"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          echo "Checking required files..."
          test -f index.html     && echo "✓ index.html"     || (echo "✗ index.html missing"     && exit 1)
          test -f css/style.css  && echo "✓ css/style.css"  || (echo "✗ css/style.css missing"  && exit 1)
          test -f js/game.js     && echo "✓ js/game.js"     || (echo "✗ js/game.js missing"     && exit 1)
          test -f js/blocks.js   && echo "✓ js/blocks.js"   || (echo "✗ js/blocks.js missing"   && exit 1)
          test -f js/ship.js     && echo "✓ js/ship.js"     || (echo "✗ js/ship.js missing"     && exit 1)
          test -f js/editor.js   && echo "✓ js/editor.js"   || (echo "✗ js/editor.js missing"   && exit 1)
          test -f .github/workflows/deploy.yml && echo "✓ deploy.yml" || (echo "✗ deploy.yml missing" && exit 1)
          echo ""
          echo "All required files present."
          echo ""
          echo "Full file list:"
          find . -not -path './.git/*' -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
