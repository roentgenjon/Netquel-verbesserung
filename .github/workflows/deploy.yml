name: Deploy to GitHub Pages

# SETUP REQUIRED: In repository Settings → Pages → Source → select "GitHub Actions"

on:
  push:
    branches: ["main", "claude/github-pages-setup-kNb4W"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML entry point exists
        run: |
          test -f index.html && echo "✓ index.html found" || (echo "✗ index.html missing" && exit 1)
          test -f js/game.js  && echo "✓ js/game.js found"  || (echo "✗ js/game.js missing"  && exit 1)
          echo "File list:"
          find . -not -path './.git/*' -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    # Only deploy from main (Pages environment restricts other branches by default)
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
